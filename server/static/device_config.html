<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>设备配置 - T113-S3</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--acc:#0284c7;--acc2:#0ea5e9;--txt:#f1f5f9;--txt2:#94a3b8;--ok:#22c55e;--err:#ef4444;--warn:#f59e0b}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px}
.topbar{background:var(--bg2);border-bottom:1px solid var(--bg3);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:600;color:var(--txt)}
.device-sel{display:flex;align-items:center;gap:8px;margin-left:auto}
.device-sel label{color:var(--txt2);font-size:13px}
.device-sel input{background:var(--bg3);border:1px solid #475569;color:var(--txt);padding:5px 10px;border-radius:6px;font-size:13px;width:160px}
.build-chip{display:inline-flex;align-items:center;gap:8px;padding:5px 10px;border-radius:999px;border:1px solid #36537f;background:#111c30;color:var(--txt2);font-size:12px;max-width:360px}
.build-chip .v{color:var(--txt);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dok{background:var(--ok)}.derr{background:var(--err)}.dwarn{background:var(--warn)}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.bok{background:#166534;color:#bbf7d0}.berr{background:#7f1d1d;color:#fecaca}.bwarn{background:#78350f;color:#fde68a}
.nav{background:var(--bg2);border-bottom:1px solid var(--bg3);display:flex;gap:2px;padding:0 16px;overflow-x:auto}
.nav button{background:none;border:none;color:var(--txt2);padding:11px 16px;cursor:pointer;border-bottom:2px solid transparent;font-size:13px;white-space:nowrap;transition:.15s}
.nav button:hover{color:var(--txt)}
.nav button.active{color:var(--acc2);border-bottom-color:var(--acc2)}
.tab{display:none;padding:20px;max-width:900px;margin:0 auto}
.tab.active{display:block}
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;padding:18px;margin-bottom:16px}
.card h3{font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:14px;text-transform:uppercase;letter-spacing:.05em}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.row.w1{grid-template-columns:1fr}
label.lbl{display:block;font-size:12px;color:var(--txt2);margin-bottom:4px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid #475569;color:var(--txt);padding:8px 10px;border-radius:6px;font-size:13px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
textarea{resize:vertical;font-family:monospace;font-size:12px}
.btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.btn:hover{opacity:.85}.btn:disabled{opacity:.5;cursor:default}
.btn-p{background:var(--acc);color:#fff}
.btn-s{background:var(--bg3);color:var(--txt)}
.btn-d{background:#7f1d1d;color:#fecaca}
.msg{margin-top:8px;font-size:13px;min-height:20px;transition:.3s}
.mok{color:var(--ok)}.merr{color:var(--err)}
.prog-wrap{background:var(--bg3);border-radius:3px;height:6px;margin-top:4px}
.prog-bar{height:6px;border-radius:3px;transition:.3s}
.info-grid{display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:13px}
.info-grid .ik{color:var(--txt2)}
.info-grid .iv{font-family:monospace}
table{width:100%;border-collapse:collapse;font-size:13px}
table th{background:var(--bg3);padding:8px 10px;text-align:left;font-weight:600;color:var(--txt2)}
table td{padding:8px 10px;border-top:1px solid var(--bg3)}
table tr:hover td{background:#1e293b55}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:11px}
.tag-ok{background:#14532d;color:#86efac}
.tag-err{background:#7f1d1d;color:#fca5a5}
.mon-box{background:#0a0f1e;border:1px solid var(--bg3);border-radius:8px;height:320px;overflow-y:auto;font-family:monospace;font-size:12px;padding:10px}
.mon-row{display:grid;grid-template-columns:90px 60px 80px 30px 1fr;gap:4px;padding:2px 0;border-bottom:1px solid #1e293b33}
.mon-hdr{color:var(--txt2);font-weight:600;border-bottom:1px solid var(--bg3)!important;margin-bottom:4px}
.offline-banner{text-align:center;padding:40px;color:var(--txt2)}
.offline-banner .ico{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:8px">
    <span class="status-dot" id="conn-dot" style="background:var(--warn)"></span>
    <h1>T113-S3 设备配置</h1>
    <span id="conn-label" style="color:var(--txt2);font-size:12px">连接中...</span>
  </div>
  <div class="device-sel">
    <label>Device ID:</label>
    <select id="device-id" onchange="onDeviceChange()" style="width:220px"></select>
    <button class="btn btn-s" onclick="refreshDeviceList()" style="padding:5px 12px">Refresh</button>
    <button class="btn btn-s" onclick="connectDevice()" style="padding:5px 12px">Connect</button>
  </div>
  <div id="build-info" class="build-chip" title="部署版本检查中">
    <span>Build</span>
    <span class="v" id="build-info-text">checking...</span>
  </div>
  <div id="dev-info" style="font-size:12px;color:var(--txt2);margin-left:8px"></div>
</div>

<nav class="nav">
  <button class="active" onclick="sw('hw',this)">硬件监控</button>
  <button onclick="sw('sys',this)">系统配置</button>
  <button onclick="sw('net',this)">网络配置</button>
  <button onclick="sw('can',this)">CAN 配置</button>
  <button onclick="sw('rules',this)">CAN-MQTT 规则</button>
  <button onclick="sw('mon',this)">CAN 监控</button>
</nav>

<!-- ===== 硬件监控 ===== -->
<div id="tab-hw" class="tab active">
  <div id="hw-offline" class="offline-banner" style="display:none">
    <div class="ico">⚠️</div>
    <div>设备离线或 IP 错误，请检查连接</div>
  </div>
  <div id="hw-content">
    <div class="row">
      <div class="card">
        <h3>系统</h3>
        <div class="info-grid">
          <span class="ik">CPU</span><span class="iv" id="hw-cpu">--</span>
          <span class="ik">内存</span><span class="iv" id="hw-mem">--</span>
          <span class="ik">运行时间</span><span class="iv" id="hw-uptime">--</span>
        </div>
      </div>
      <div class="card">
        <h3>网络</h3>
        <div id="hw-net">--</div>
      </div>
    </div>
    <div class="card">
      <h3>存储</h3>
      <div id="hw-stor">--</div>
    </div>
    <div class="card">
      <h3>CAN</h3>
      <div id="hw-can">--</div>
    </div>
  </div>
</div>

<!-- ===== 系统配置 ===== -->
<div id="tab-sys" class="tab">
  <div class="card">
    <h3>传输模式</h3>
    <div class="row w1"><div>
      <label class="lbl">模式</label>
      <select id="t-mode"><option value="mqtt">MQTT</option><option value="websocket">WebSocket</option></select>
    </div></div>
  </div>
  <div class="card">
    <h3>MQTT 配置</h3>
    <div class="row">
      <div><label class="lbl">服务器地址</label><input id="m-host" placeholder="cloud.yshut.cn"></div>
      <div><label class="lbl">端口</label><input id="m-port" type="number" value="1883"></div>
    </div>
    <div class="row">
      <div><label class="lbl">Topic 前缀</label><input id="m-prefix" placeholder="app_lvgl"></div>
      <div><label class="lbl">QoS</label><select id="m-qos"><option>0</option><option>1</option><option>2</option></select></div>
    </div>
    <div class="row">
      <div><label class="lbl">Client ID</label><input id="m-cid"></div>
      <div><label class="lbl">Keepalive (s)</label><input id="m-ka" type="number" value="60"></div>
    </div>
    <div class="row">
      <div><label class="lbl">用户名</label><input id="m-user"></div>
      <div><label class="lbl">密码</label><input id="m-pass" type="password"></div>
    </div>
  </div>
  <div class="card">
    <h3>WebSocket 配置</h3>
    <div class="row">
      <div><label class="lbl">服务器地址</label><input id="w-host" placeholder="cloud.yshut.cn"></div>
      <div><label class="lbl">端口</label><input id="w-port" type="number" value="5052"></div>
    </div>
    <div class="row w1"><div><label class="lbl">路径</label><input id="w-path" value="/ws"></div></div>
  </div>
  <button class="btn btn-p" onclick="saveSys()">保存（重启后生效）</button>
  <button class="btn btn-s" onclick="loadSys()" style="margin-left:8px">重新加载</button>
  <div class="msg" id="sys-msg"></div>
</div>

<!-- ===== 网络配置 ===== -->
<div id="tab-net" class="tab">
  <div class="card">
    <h3>以太网</h3>
    <div class="row">
      <div><label class="lbl">网卡</label><input id="n-iface" value="eth0"></div>
      <div><label class="lbl">DHCP</label>
        <select id="n-dhcp" onchange="tDhcp()">
          <option value="false">静态 IP</option>
          <option value="true">DHCP</option>
        </select>
      </div>
    </div>
    <div id="n-static">
      <div class="row">
        <div><label class="lbl">IP 地址</label><input id="n-ip" placeholder="192.168.100.100"></div>
        <div><label class="lbl">子网掩码</label><input id="n-mask" placeholder="255.255.255.0"></div>
      </div>
      <div class="row w1"><div><label class="lbl">默认网关</label><input id="n-gw" placeholder="192.168.100.1"></div></div>
    </div>
  </div>
  <button class="btn btn-p" onclick="saveNet()">保存并应用</button>
  <button class="btn btn-s" onclick="loadNet()" style="margin-left:8px">重新加载</button>
  <div class="msg" id="net-msg"></div>
  <p style="color:var(--warn);font-size:12px;margin-top:8px">应用网络配置后，设备可能会短暂离线；如果修改了设备 IP，请确保设备仍能连接到当前服务器和 MQTT Broker。</p>
</div>

<!-- ===== CAN 配置 ===== -->
<div id="tab-can" class="tab">
  <div class="card">
    <h3>波特率</h3>
    <div class="row">
      <div>
        <label class="lbl">CAN0</label>
        <select id="c0-baud">
          <option value="1000000">1Mbps</option>
          <option value="800000">800kbps</option>
          <option value="500000" selected>500kbps</option>
          <option value="250000">250kbps</option>
          <option value="125000">125kbps</option>
          <option value="100000">100kbps</option>
        </select>
      </div>
      <div>
        <label class="lbl">CAN1</label>
        <select id="c1-baud">
          <option value="1000000">1Mbps</option>
          <option value="800000">800kbps</option>
          <option value="500000" selected>500kbps</option>
          <option value="250000">250kbps</option>
          <option value="125000">125kbps</option>
          <option value="100000">100kbps</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div>
        <label class="lbl">CAN0 自动检测</label>
        <select id="c0-auto"><option value="false">否（使用上方值）</option><option value="true">是</option></select>
      </div>
      <div>
        <label class="lbl">CAN1 自动检测</label>
        <select id="c1-auto"><option value="false">否</option><option value="true">是</option></select>
      </div>
    </div>
  </div>
  <div class="card">
    <h3>CAN 录制</h3>
    <div class="row">
      <div><label class="lbl">录制目录</label><input id="c-rdir" value="/mnt/SDCARD/can_records"></div>
      <div><label class="lbl">单文件最大 (MB)</label><input id="c-rmb" type="number" value="40"></div>
    </div>
  </div>
  <button class="btn btn-p" onclick="saveCan()">保存</button>
  <button class="btn btn-s" onclick="loadSys()" style="margin-left:8px">重新加载</button>
  <div class="msg" id="can-msg"></div>
</div>

<!-- ===== CAN-MQTT 规则 ===== -->
<div id="tab-rules" class="tab">
  <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center">
    <button class="btn btn-p" onclick="addRule()">+ 新增规则</button>
    <button class="btn btn-s" onclick="loadRules()">刷新</button>
    <span style="color:var(--txt2);font-size:12px">共 <b id="rule-count">0</b> 条规则</span>
    <span class="msg" id="rules-msg" style="margin:0;margin-left:auto"></span>
  </div>
  <div id="rules-list"></div>
  <div id="rule-editor" style="display:none" class="card">
    <h3 id="re-title">编辑规则</h3>
    <div class="row">
      <div><label class="lbl">规则 ID</label><input id="re-rule-id" placeholder="如 rule_bms_voltage"></div>
      <div><label class="lbl">规则名称</label><input id="re-name" placeholder="用于备注显示"></div>
    </div>
    <div class="row">
      <div><label class="lbl">报文名称</label><input id="re-msg" placeholder="如 BMS_Status"></div>
      <div><label class="lbl">信号名称</label><input id="re-sig" placeholder="如 PackVoltage"></div>
    </div>
    <div class="row">
      <div><label class="lbl">CAN ID（十六进制或 ANY）</label><input id="re-id" placeholder="08C / ANY"></div>
      <div><label class="lbl">接口</label>
        <select id="re-iface"><option value="can0">can0</option><option value="can1">can1</option><option value="any">any（两路）</option></select>
      </div>
    </div>
    <div class="row">
      <div><label class="lbl">扩展帧</label>
        <select id="re-ext"><option value="false">否</option><option value="true">是</option></select>
      </div>
      <div><label class="lbl">匹配任意 ID</label>
        <select id="re-any"><option value="false">否</option><option value="true">是</option></select>
      </div>
    </div>
    <div class="row">
      <div><label class="lbl">字节序</label>
        <select id="re-bo"><option value="little_endian">小端（Intel）</option><option value="big_endian">大端（Motorola）</option></select>
      </div>
      <div><label class="lbl">有符号</label>
        <select id="re-sgn"><option value="false">否</option><option value="true">是</option></select>
      </div>
    </div>
    <div class="row">
      <div><label class="lbl">起始位</label><input id="re-sb" type="number" value="0"></div>
      <div><label class="lbl">位长度</label><input id="re-bl" type="number" value="8"></div>
    </div>
    <div class="row">
      <div><label class="lbl">系数 (factor)</label><input id="re-factor" type="number" step="any" value="1"></div>
      <div><label class="lbl">偏移 (offset)</label><input id="re-offset" type="number" step="any" value="0"></div>
    </div>
    <div class="row">
      <div><label class="lbl">单位</label><input id="re-unit" placeholder="如 V / A / ℃"></div>
      <div><label class="lbl">启用</label>
        <select id="re-en"><option value="true">启用</option><option value="false">禁用</option></select>
      </div>
    </div>
    <div class="row w1">
      <div><label class="lbl">MQTT Topic（支持 {id} {iface} 变量）</label><input id="re-topic" placeholder="can/{iface}/signal"></div>
    </div>
    <div class="row">
      <div><label class="lbl">Payload 模式</label>
        <select id="re-pm">
          <option value="0">标准</option>
          <option value="1">RAW</option>
        </select>
      </div>
      <div><label class="lbl">QoS</label>
        <select id="re-qos"><option>0</option><option>1</option><option>2</option></select>
      </div>
    </div>
    <div class="row">
      <div><label class="lbl">Retain</label>
        <select id="re-ret"><option value="false">否</option><option value="true">是</option></select>
      </div>
      <div><label class="lbl">优先级</label><input id="re-pri" type="number" value="0"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn btn-p" onclick="saveRule()">保存规则</button>
      <button class="btn btn-s" onclick="cancelRule()">取消</button>
    </div>
  </div>
</div>

<!-- ===== CAN 监控 ===== -->
<div id="tab-mon" class="tab">
  <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
    <button class="btn btn-p" id="mon-btn" onclick="toggleMon()">▶ 开始监控</button>
    <button class="btn btn-s" onclick="clearMon()">清空</button>
    <label style="display:flex;align-items:center;gap:6px;color:var(--txt2);font-size:13px">
      <input type="checkbox" id="mon-scroll" checked style="width:auto"> 自动滚动
    </label>
    <span style="color:var(--txt2);font-size:12px">已收 <b id="mon-count">0</b> 帧</span>
    <label style="display:flex;align-items:center;gap:6px;color:var(--txt2);font-size:13px;margin-left:auto">
      过滤 ID:
      <input id="mon-filter" placeholder="如 08C" style="width:80px;padding:4px 8px">
    </label>
  </div>
  <div class="mon-box" id="mon-box">
    <div class="mon-row mon-hdr">
      <span>时间</span><span>接口</span><span>ID</span><span>DLC</span><span>数据</span>
    </div>
  </div>
</div>

<script>
var gDeviceId = '';
var gMonTimer = null, gMonRows = [], gMonRunning = false;
var gr = {version:1, rules:[]}, gei = -1;
var gApiMap = {
  status: '/api/device/remote/status',
  hardware: '/api/device/remote/hardware',
  config: '/api/device/remote/config',
  network: '/api/device/remote/network',
  rules: '/api/device/remote/rules',
  can_frames: '/api/can/frames'
};

function api(path, opts) {
  var url = gApiMap[path] || path;
  if(url.charAt(0) !== '/') url = '/api/device/remote/' + path;
  if(gDeviceId) url += (url.indexOf('?') >= 0 ? '&' : '?') + 'device_id=' + encodeURIComponent(gDeviceId);
  return fetch(url, opts || {});
}

function setBuildInfo(server) {
  var box = document.getElementById('build-info');
  var txt = document.getElementById('build-info-text');
  if(!box || !txt) return;
  server = server || {};
  var build = String(server.build_tag || '').trim();
  var commit = String(server.git_commit || '').trim();
  var started = String(server.process_started_at || '').trim();
  var host = String(server.hostname || '').trim();
  var pid = server.pid != null ? String(server.pid) : '';
  var label = [build, commit].filter(Boolean).join(' / ') || 'unknown';
  txt.textContent = label;
  var tips = [];
  if(build) tips.push('Build: ' + build);
  if(commit) tips.push('Commit: ' + commit);
  if(started) tips.push('Started: ' + started);
  if(host) tips.push('Host: ' + host);
  if(pid) tips.push('PID: ' + pid);
  box.title = tips.join('\n') || '部署版本未知';
}

async function loadBuildInfo() {
  try {
    var r = await fetch('/api/version', {cache:'no-store'});
    var d = await r.json();
    setBuildInfo(d.server || {});
  } catch(e) {
    setBuildInfo({});
  }
}

function onDeviceChange() {
  var sel = document.getElementById('device-id');
  gDeviceId = (sel && sel.value || '').trim();
}

async function refreshDeviceList(preferredId) {
  var sel = document.getElementById('device-id');
  if(!sel) return;
  try {
    var r = await fetch('/api/device/list');
    var d = await r.json();
    var ids = [];
    var seen = {};
    function addId(id) {
      id = String(id || '').trim();
      if(!id || seen[id]) return;
      seen[id] = true;
      ids.push(id);
    }
    addId(d.current_device_id);
    (d.devices || []).forEach(addId);
    (d.history || []).forEach(addId);

    if(ids.length === 0) {
      sel.innerHTML = '<option value="">No devices</option>';
      gDeviceId = '';
      return;
    }

    sel.innerHTML = ids.map(function(id){
      return '<option value="' + escH(id) + '">' + escH(id) + '</option>';
    }).join('');

    var nextId = (preferredId || gDeviceId || d.current_device_id || ids[0] || '').trim();
    if(ids.indexOf(nextId) < 0) nextId = ids[0] || '';
    sel.value = nextId;
    gDeviceId = nextId;
  } catch(e) {
    sel.innerHTML = '<option value="">Load failed</option>';
    gDeviceId = '';
  }
}

function sm(id, ok, t) {
  var e = document.getElementById(id);
  e.className = 'msg ' + (ok ? 'mok' : 'merr');
  e.textContent = (ok ? '✓ ' : '✗ ') + t;
  setTimeout(function(){ e.textContent=''; e.className='msg'; }, 5000);
}

function fb(b) {
  if(b<1024) return b+'B';
  if(b<1048576) return (b/1024).toFixed(1)+'KB';
  if(b<1073741824) return (b/1048576).toFixed(1)+'MB';
  return (b/1073741824).toFixed(2)+'GB';
}

function fu(s) {
  var h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sc=s%60;
  return h+'h '+m+'m '+sc+'s';
}

function sw(n, b) {
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.nav button').forEach(function(x){ x.classList.remove('active'); });
  document.getElementById('tab-'+n).classList.add('active');
  b.classList.add('active');
  if(n==='hw') loadHw();
  if(n==='sys'||n==='can') loadSys();
  if(n==='net') loadNet();
  if(n==='rules') loadRules();
  if(n==='mon') startMon();
}

function tDhcp() {
  var dh = document.getElementById('n-dhcp').value === 'true';
  document.getElementById('n-static').style.display = dh ? 'none' : 'block';
}

async function connectDevice() {
  onDeviceChange();
  if(!gDeviceId) {
    document.getElementById('conn-dot').style.background = 'var(--err)';
    document.getElementById('conn-label').textContent = 'No device selected';
    document.getElementById('dev-info').textContent = 'Refresh and choose a device first';
    document.getElementById('hw-offline').style.display = 'block';
    return;
  }

  document.getElementById('conn-dot').style.background = 'var(--warn)';
  document.getElementById('conn-label').textContent = 'Connecting...';
  try {
    var r = await api('status');
    var d = await r.json();
    if (d.connected || d.ok) {
      document.getElementById('conn-dot').style.background = 'var(--ok)';
      document.getElementById('conn-label').textContent = 'Connected';
      document.getElementById('dev-info').innerHTML =
        '<b>ID:</b> '+(d.device_id||gDeviceId||'--')+
        ' &nbsp; <b>Uptime:</b> '+fu(d.uptime_seconds||0)+
        ' &nbsp; <b>Rules:</b> '+(d.rule_count||0)+
        ' &nbsp; <b>MQTT:</b> '+(d.mqtt_connected?'<span class="badge bok">Online</span>':'<span class="badge berr">Offline</span>');
      document.getElementById('hw-offline').style.display = 'none';
      loadHw();
    } else {
      throw new Error(d.error || ('HTTP ' + r.status));
    }
  } catch(e) {
    document.getElementById('conn-dot').style.background = 'var(--err)';
    document.getElementById('conn-label').textContent = 'Connect failed: ' + e.message;
    document.getElementById('hw-offline').style.display = 'block';
  }
}

async function loadHw() {
  try {
    var [sr, hr] = await Promise.all([api('status'), api('hardware')]);
    var s = await sr.json(), hw = await hr.json();
    var sys = hw.system || {};
    document.getElementById('hw-cpu').textContent = sys.cpu_usage!=null ? sys.cpu_usage.toFixed(1)+'%' : '--';
    var memFreeStr = sys.memory_free != null ? ' (可用:'+fb(sys.memory_free*1024)+')' : '';
    document.getElementById('hw-mem').textContent = fb((sys.memory_used||0)*1024)+' / '+fb((sys.memory_total||1)*1024)+memFreeStr;
    document.getElementById('hw-uptime').textContent = fu(s.uptime_seconds||0);

    var storageList = Array.isArray(hw.storage) ? hw.storage : (hw.storage ? [hw.storage] : []);
    var networkList = Array.isArray(hw.network) ? hw.network : (hw.network ? [hw.network] : []);
    var canList = Array.isArray(hw.can) ? hw.can : [];
    if(!canList.length) {
      if(hw.can0) canList.push(Object.assign({interface:'can0'}, hw.can0));
      if(hw.can1) canList.push(Object.assign({interface:'can1'}, hw.can1));
    }

    var sh = '';
    storageList.forEach(function(s2){
      var lbl = s2.label || s2.mount_point;
      var mounted = typeof s2.is_mounted === 'boolean' ? s2.is_mounted : !!s2.mounted;
      var totalBytes = s2.total_bytes != null ? s2.total_bytes : (s2.total || 0);
      var usedBytes = s2.used_bytes != null ? s2.used_bytes : (s2.used || 0);
      var freeBytes = s2.free_bytes != null ? s2.free_bytes : (s2.free || 0);
      if(!mounted){
        sh += '<div style="margin-bottom:8px;display:flex;justify-content:space-between;align-items:center"><span>'+lbl+'</span><span class="badge" style="background:#475569">未插入</span></div>';
      } else {
        var p = totalBytes>0 ? ((usedBytes/totalBytes)*100).toFixed(1) : 0;
        var bc = p>90?'#ef4444':p>70?'#f59e0b':'#0284c7';
        sh += '<div style="margin-bottom:10px">';
        sh += '<div style="display:flex;justify-content:space-between"><span>'+lbl+'</span>';
        sh += '<span>'+fb(usedBytes)+' / '+fb(totalBytes)+' ('+p+'%)</span></div>';
        sh += '<div class="prog-wrap"><div class="prog-bar" style="background:'+bc+';width:'+p+'%"></div></div>';
        sh += '<div style="color:var(--txt2);font-size:11px;margin-top:2px">可用: '+fb(freeBytes)+'</div></div>';
      }
    });
    document.getElementById('hw-stor').innerHTML = sh || '无信息';

    var nh = '';
    networkList.forEach(function(n){
      nh += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
      var connected = typeof n.is_connected === 'boolean' ? n.is_connected : !!n.connected;
      nh += '<span class="status-dot '+(connected?'dok':'derr')+'"></span>';
      nh += '<b>'+n.interface+'</b> '+(n.ip_address||n.ip||'无IP');
      nh += ' <span style="color:var(--txt2)">'+(connected?'已连接':'未连接')+'</span></div>';
    });
    document.getElementById('hw-net').innerHTML = nh || '无信息';

    var ch = '';
    canList.forEach(function(c){
      var bitrate = c.bitrate || 0;
      var rxCount = c.rx_count != null ? c.rx_count : (c.rx || 0);
      var txCount = c.tx_count != null ? c.tx_count : (c.tx || 0);
      var br = bitrate>=1000 ? (bitrate/1000).toFixed(0)+'kbps' : bitrate+' bps';
      ch += '<div style="margin-bottom:5px"><b>'+c.interface+'</b> '+br;
      ch += ' &nbsp; Rx:<span style="color:var(--ok)">'+rxCount+'</span>';
      ch += ' Tx:<span style="color:#60a5fa">'+txCount+'</span></div>';
    });
    document.getElementById('hw-can').innerHTML = ch || '无信息';
  } catch(e) {
    document.getElementById('hw-offline').style.display = 'block';
  }
}

/* ===== CAN-MQTT 规则 ===== */
function escH(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function parseCanId(v){
  if(v==null) return 0;
  var s = String(v).trim();
  if(!s || s.toUpperCase()==='ANY') return 0;
  if(/^0x/i.test(s)) return parseInt(s,16)||0;
  if(/^[0-9a-f]+$/i.test(s) && /[a-f]/i.test(s)) return parseInt(s,16)||0;
  return parseInt(s,10)||0;
}
function ruleHex(v){ return '0x'+((parseInt(v,10)||0)>>>0).toString(16).toUpperCase(); }
function normPayloadMode(v){
  if(v===1 || v==='1') return 1;
  var s = String(v==null?'':v).trim().toLowerCase();
  return (s==='1' || s==='raw' || s==='raw_hex') ? 1 : 0;
}
function normRule(r){
  r = r || {};
  var m = r.match || {}, s = r.source || {}, d = r.decode || {}, q = r.mqtt || {}, p = r.publish || {};
  return {
    id: String(r.id || r.rule_id || '').trim(),
    name: String(r.name || '').trim(),
    enabled: r.enabled !== false,
    priority: parseInt(r.priority, 10) || 0,
    channel: String(r.channel || r.interface || m.channel || 'any').trim() || 'any',
    can_id: parseCanId(r.can_id != null ? r.can_id : m.can_id),
    is_extended: r.is_extended != null ? !!r.is_extended : !!m.is_extended,
    match_any_id: r.match_any_id != null ? !!r.match_any_id : !!m.match_any_id,
    message_name: String(r.message_name || s.message_name || '').trim(),
    signal_name: String(r.signal_name || s.signal_name || '').trim(),
    decode: {
      start_bit: parseInt(d.start_bit, 10) || 0,
      bit_length: parseInt(d.bit_length != null ? d.bit_length : d.length, 10) || 8,
      byte_order: (d.byte_order === 'big_endian' || d.byte_order === 1 || d.byte_order === '1') ? 1 : 0,
      is_signed: d.is_signed === true || d.signed === true || d.is_signed === 'true',
      factor: d.factor != null && !isNaN(parseFloat(d.factor)) ? parseFloat(d.factor) : 1,
      offset: d.offset != null && !isNaN(parseFloat(d.offset)) ? parseFloat(d.offset) : 0,
      unit: String(d.unit || '').trim()
    },
    mqtt: {
      topic_template: String(q.topic_template || p.topic || '').trim(),
      payload_mode: normPayloadMode(q.payload_mode != null ? q.payload_mode : p.payload_mode),
      qos: parseInt(q.qos != null ? q.qos : p.qos, 10) || 0,
      retain: q.retain === true || q.retain === 'true'
    }
  };
}
function ruleTitle(rule, i){
  return rule.signal_name || rule.name || rule.message_name || rule.id || ('规则' + (i + 1));
}
function ruleMeta(rule){
  var parts = [];
  if(rule.message_name) parts.push(rule.message_name);
  if(rule.name && rule.name !== rule.signal_name) parts.push(rule.name);
  if(rule.id) parts.push('ID ' + rule.id);
  return parts.join(' · ');
}
function ruleSignalText(rule){
  var d = rule.decode || {};
  var parts = ['bit' + (d.start_bit || 0), 'len' + (d.bit_length || 0)];
  if((d.factor || 1) !== 1) parts.push('×' + d.factor);
  if(d.offset) parts.push('+' + d.offset);
  if(d.unit) parts.push(d.unit);
  return parts.join(' ');
}
function syncRules(){
  gr = (gr && typeof gr === 'object') ? gr : {version:1, rules:[]};
  if(!Array.isArray(gr.rules)) gr.rules = [];
  gr.rules = gr.rules.map(normRule);
}
async function loadRules() {
  try {
    var r = await api('rules', {cache:'no-store'}), d = await r.json();
    gr = (d && typeof d === 'object') ? d : {version:1,rules:[]};
    syncRules();
    document.getElementById('rule-count').textContent = (gr.rules||[]).length;
    if(d && d.ok === false) {
      var extra = [];
      if(d.source) extra.push(d.source);
      if(d.path) extra.push(d.path);
      sm('rules-msg', false, (d.error || '规则读取失败') + (extra.length ? ' [' + extra.join(' | ') + ']' : ''));
    } else if(d && d.source) {
      sm('rules-msg', true, '规则来源: ' + d.source + (d.path ? (' (' + d.path + ')') : ''));
    }
    renderRules();
  } catch(e) {
    sm('rules-msg', false, '请求失败');
  }
}

function renderRules() {
  syncRules();
  var rules = gr.rules || [];
  var h = '';
  if(rules.length === 0) {
    h = '<div style="color:var(--txt2);text-align:center;padding:30px">暂无规则，点击“新增规则”添加</div>';
  } else {
    h = '<table><tr><th>信号 / 报文</th><th>CAN ID</th><th>接口</th><th>MQTT Topic</th><th>解析</th><th>状态</th><th>操作</th></tr>';
    rules.forEach(function(rule, i) {
      var topic = (rule.mqtt||{}).topic_template || '--';
      var meta = ruleMeta(rule);
      h += '<tr>';
      h += '<td><div><b>'+escH(ruleTitle(rule, i))+'</b></div><div style="color:var(--txt2);font-size:12px">'+escH(meta || '--')+'</div></td>';
      h += '<td><span class="tag '+(rule.match_any_id?'tag-err':'tag-ok')+'">'+escH(rule.match_any_id ? 'ANY' : ruleHex(rule.can_id))+'</span>';
      h += '<div style="color:var(--txt2);font-size:12px;margin-top:4px">'+(rule.is_extended ? '扩展帧' : '标准帧')+'</div></td>';
      h += '<td>'+escH(rule.channel || 'any')+'</td>';
      h += '<td style="font-family:monospace;font-size:12px;word-break:break-all;max-width:240px">'+escH(topic)+'</td>';
      h += '<td style="color:var(--txt2);font-size:12px">'+escH(ruleSignalText(rule))+'</td>';
      h += '<td>'+(rule.enabled ? '<span class="badge bok">启用</span>' : '<span class="badge berr">禁用</span>')+'</td>';
      h += '<td><button class="btn btn-s" onclick="editRule('+i+')" style="padding:3px 10px;margin-right:4px">编辑</button>';
      h += '<button class="btn btn-d" onclick="delRule('+i+')" style="padding:3px 10px">删</button></td>';
      h += '</tr>';
    });
    h += '</table>';
  }
  document.getElementById('rules-list').innerHTML = h;
  document.getElementById('rule-editor').style.display = 'none';
}

function resetRuleEditor() {
  ['re-rule-id','re-name','re-msg','re-sig','re-id','re-unit','re-topic'].forEach(function(id){ document.getElementById(id).value=''; });
  document.getElementById('re-iface').value='any';
  document.getElementById('re-ext').value='false';
  document.getElementById('re-any').value='false';
  document.getElementById('re-bo').value='little_endian';
  document.getElementById('re-sgn').value='false';
  document.getElementById('re-sb').value=0;
  document.getElementById('re-bl').value=8;
  document.getElementById('re-factor').value=1;
  document.getElementById('re-offset').value=0;
  document.getElementById('re-en').value='true';
  document.getElementById('re-pm').value='0';
  document.getElementById('re-qos').value='0';
  document.getElementById('re-ret').value='false';
  document.getElementById('re-pri').value='0';
}

function addRule() {
  gei = -1;
  document.getElementById('re-title').textContent = '新增规则';
  resetRuleEditor();
  document.getElementById('rule-editor').style.display='block';
  document.getElementById('rule-editor').scrollIntoView({behavior:'smooth'});
}

function editRule(i) {
  gei = i;
  var rule = normRule(gr.rules[i] || {});
  document.getElementById('re-title').textContent = '编辑规则';
  document.getElementById('re-rule-id').value = rule.id || '';
  document.getElementById('re-name').value = rule.name || '';
  document.getElementById('re-msg').value = rule.message_name || '';
  document.getElementById('re-sig').value = rule.signal_name || '';
  document.getElementById('re-id').value = rule.match_any_id ? 'ANY' : ruleHex(rule.can_id);
  document.getElementById('re-iface').value = rule.channel || 'any';
  document.getElementById('re-ext').value = rule.is_extended ? 'true' : 'false';
  document.getElementById('re-any').value = rule.match_any_id ? 'true' : 'false';
  document.getElementById('re-bo').value = rule.decode.byte_order === 1 ? 'big_endian' : 'little_endian';
  document.getElementById('re-sgn').value = rule.decode.is_signed ? 'true' : 'false';
  document.getElementById('re-sb').value = rule.decode.start_bit || 0;
  document.getElementById('re-bl').value = rule.decode.bit_length || 8;
  document.getElementById('re-factor').value = rule.decode.factor != null ? rule.decode.factor : 1;
  document.getElementById('re-offset').value = rule.decode.offset != null ? rule.decode.offset : 0;
  document.getElementById('re-unit').value = rule.decode.unit || '';
  document.getElementById('re-en').value = rule.enabled ? 'true' : 'false';
  document.getElementById('re-topic').value = (rule.mqtt||{}).topic_template || '';
  document.getElementById('re-pm').value = String((rule.mqtt||{}).payload_mode || 0);
  document.getElementById('re-qos').value = String((rule.mqtt||{}).qos || 0);
  document.getElementById('re-ret').value = (rule.mqtt||{}).retain ? 'true' : 'false';
  document.getElementById('re-pri').value = rule.priority != null ? rule.priority : 0;
  document.getElementById('rule-editor').style.display='block';
  document.getElementById('rule-editor').scrollIntoView({behavior:'smooth'});
}

function cancelRule() { document.getElementById('rule-editor').style.display='none'; }

async function postRules(successText) {
  syncRules();
  var payload = {version: Math.max(1, parseInt(gr.version, 10) || 1), rules: gr.rules};
  try {
    var r = await api('rules', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
    var d = await r.json();
    if(d && d.ok) {
      document.getElementById('rule-editor').style.display='none';
      sm('rules-msg', true, successText || '规则已保存');
      gr.version = payload.version;
      document.getElementById('rule-count').textContent = (gr.rules||[]).length;
      renderRules();
    } else {
      sm('rules-msg', false, (d && d.error) || '保存失败');
    }
  } catch(e) {
    sm('rules-msg', false, '请求失败');
  }
}

async function saveRule() {
  var base = gei >= 0 ? normRule(gr.rules[gei]) : normRule({});
  var canText = document.getElementById('re-id').value.trim();
  var matchAny = document.getElementById('re-any').value === 'true' || canText.toUpperCase() === 'ANY';
  base.id = document.getElementById('re-rule-id').value.trim() || base.id || ('r' + Date.now());
  base.name = document.getElementById('re-name').value.trim();
  base.message_name = document.getElementById('re-msg').value.trim();
  base.signal_name = document.getElementById('re-sig').value.trim();
  base.channel = document.getElementById('re-iface').value || 'any';
  base.can_id = matchAny ? 0 : parseCanId(canText);
  base.is_extended = document.getElementById('re-ext').value === 'true';
  base.match_any_id = matchAny;
  base.enabled = document.getElementById('re-en').value === 'true';
  base.priority = parseInt(document.getElementById('re-pri').value, 10) || 0;
  base.decode = {
    start_bit: parseInt(document.getElementById('re-sb').value, 10) || 0,
    bit_length: parseInt(document.getElementById('re-bl').value, 10) || 8,
    byte_order: document.getElementById('re-bo').value === 'big_endian' ? 1 : 0,
    is_signed: document.getElementById('re-sgn').value === 'true',
    factor: parseFloat(document.getElementById('re-factor').value),
    offset: parseFloat(document.getElementById('re-offset').value),
    unit: document.getElementById('re-unit').value.trim()
  };
  if(isNaN(base.decode.factor)) base.decode.factor = 1;
  if(isNaN(base.decode.offset)) base.decode.offset = 0;
  base.mqtt = {
    topic_template: document.getElementById('re-topic').value.trim(),
    payload_mode: normPayloadMode(document.getElementById('re-pm').value),
    qos: parseInt(document.getElementById('re-qos').value, 10) || 0,
    retain: document.getElementById('re-ret').value === 'true'
  };
  if(!base.name) base.name = base.signal_name || base.id || '规则';
  if(!base.signal_name && base.name) base.signal_name = base.name;
  base = normRule(base);
  if(gei >= 0) gr.rules[gei] = base;
  else gr.rules.push(base);
  await postRules('规则已保存');
}

async function delRule(i) {
  var rule = normRule(gr.rules[i] || {});
  if(!confirm('确认删除规则“' + ruleTitle(rule, i) + '”？')) return;
  gr.rules.splice(i, 1);
  await postRules('已删除');
}

/* ===== CAN 监控 ===== */
var gMonSeen = 0;
function toggleMon() {
  if(gMonRunning) {
    clearInterval(gMonTimer); gMonTimer=null; gMonRunning=false;
    document.getElementById('mon-btn').textContent='▶ 开始监控';
  } else {
    gMonRunning=true;
    document.getElementById('mon-btn').textContent='⏹ 停止监控';
    pollMon();
    gMonTimer=setInterval(pollMon,1000);
  }
}
function startMon() { if(!gMonRunning) toggleMon(); }
function clearMon() { document.getElementById('mon-box').innerHTML='<div class="mon-row mon-hdr"><span>时间</span><span>接口</span><span>ID</span><span>DLC</span><span>数据</span></div>'; gMonSeen=0; document.getElementById('mon-count').textContent=0; }

async function pollMon() {
  var filter = document.getElementById('mon-filter').value.trim().toUpperCase();
  try {
    var r = await api('can_frames?limit=50'), frames = await r.json();
    if(!Array.isArray(frames)) frames = frames.frames||frames.data||[];
    var box = document.getElementById('mon-box');
    var newCount = 0;
    frames.forEach(function(f){
      var idStr = (f.id||0).toString(16).toUpperCase().padStart(3,'0');
      if(filter && idStr.indexOf(filter)<0) return;
      var ts = f.timestamp ? new Date(Math.round(f.timestamp)*1000).toLocaleTimeString() : '--';
      var data = (f.data||[]);
      var dlc = data.length;
      var hx = data.map(function(b){ return ('0'+b.toString(16).toUpperCase()).slice(-2); }).join(' ');
      var row = document.createElement('div');
      row.className='mon-row';
      row.innerHTML='<span>'+ts+'</span><span style="color:#60a5fa">'+(f.iface||'--')+'</span><span style="color:#4ade80">0x'+idStr+'</span><span>'+dlc+'</span><span style="color:var(--txt2)">'+hx+'</span>';
      box.appendChild(row);
      newCount++;
    });
    if(newCount>0){
      gMonSeen+=newCount;
      document.getElementById('mon-count').textContent=gMonSeen;
      if(document.getElementById('mon-scroll').checked) box.scrollTop=box.scrollHeight;
      /* 限制行数，避免 DOM 过大 */
      var rows=box.querySelectorAll('.mon-row:not(.mon-hdr)');
      if(rows.length>500) for(var i=0;i<rows.length-500;i++) rows[i].remove();
    }
  } catch(e) {}
}

/* 初始化 */
window.onload = async function(){
  await loadBuildInfo();
  await refreshDeviceList();
  connectDevice();
};
</script>
