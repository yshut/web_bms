<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>车机可视化仪表盘</title>
  <style>
    html, body { height:100%; margin:0; background: radial-gradient(ellipse at center, #0b2447 0%, #061427 70%); color:#d7e3ff; font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
    .stage { position:relative; width:100%; height:100%; overflow:hidden; }
    .hud { position:absolute; inset:0; pointer-events:none; }
    .panel { position:absolute; background: rgba(13,54,107,0.25); border:1px solid rgba(63,140,255,0.3); border-radius:10px; box-shadow: 0 0 20px rgba(63,140,255,0.2) inset; padding:12px 16px; }
    .badge { display:inline-flex; align-items:center; gap:8px; font-weight:bold; }
    .dot { width:10px; height:10px; border-radius:50%; background:#df3b3b; box-shadow:0 0 8px #df3b3b; }
    .dot.on { background:#2ecc71; box-shadow:0 0 8px #2ecc71; }
    .ring { position:absolute; border:2px solid rgba(63,140,255,0.6); border-radius:50%; animation: pulse 3s infinite; }
    @keyframes pulse { 0%{ transform:scale(0.98); opacity:.7 } 50%{ transform:scale(1.02); opacity:1 } 100%{ transform:scale(0.98); opacity:.7 } }
    canvas { position:absolute; left:0; top:0; width:100%; height:100%; }
    .gauge { position:absolute; width:180px; height:180px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; color:#9bd0ff; border:2px solid rgba(63,140,255,0.6); box-shadow:0 0 20px rgba(63,140,255,0.15) inset; }
    .g1 { left:30%; top:18%; }
    .g2 { left:45%; top:18%; }
    .g3 { left:60%; top:18%; }
    .status { left:2%; top:2%; width:360px; }
    .br-panel { left:2%; bottom:4%; width:320px; }
    .car { position:absolute; left:50%; top:62%; transform:translate(-50%,-50%); width:720px; height:280px; background: radial-gradient(ellipse at center, rgba(0,197,255,0.25), rgba(0,197,255,0) 60%); border-radius:40% 40% 30% 30%/60% 60% 40% 40%; filter: blur(0.2px); }
    /* CAN 数据解析按钮 */
    .can-btn { position:absolute; right:2%; bottom:3%; z-index:10; pointer-events:auto; }
    .can-btn a { display:inline-block; padding:10px 14px; border-radius:8px; background:#1a73e8; color:#fff; text-decoration:none; border:1px solid rgba(255,255,255,0.2); box-shadow:0 6px 14px rgba(26,115,232,0.35); font-weight:600; letter-spacing:.5px; }
    .can-btn a:hover { background:#1669c1; }
  </style>
</head>
<body>
  <div class="stage">
    <canvas id="bg"></canvas>
    <div class="hud">
      <div class="panel status">
        <div class="badge"><div id="connDot" class="dot"></div><div id="connText">设备未连接</div></div>
        <div style="margin-top:6px" class="badge"><div id="monDot" class="dot"></div><div id="monText">监控未启动</div></div>
        <div style="margin-top:6px">波特率：<span id="br">CAN0 - / CAN1 -</span></div>
      </div>
      <div class="gauge g1" id="g1">0.00</div>
      <div class="gauge g2" id="g2">0.00</div>
      <div class="gauge g3" id="g3">0.00</div>
      <div class="panel br-panel">
        <div>实时帧数（1s）: <span id="fps">0</span></div>
        <div>累计帧数: <span id="total">0</span></div>
        <div style="margin-top:8px; font-weight:bold">电池包指标</div>
        <div>总压: <span id="bmst">-</span> V　电流: <span id="bmsi">-</span> A</div>
        <div>单体电压 最大/最小/平均: <span id="cellv">-/-/-</span> V</div>
        <div>温度 最大/最小/平均: <span id="tempt">-/-/-</span> ℃</div>
        <div>系统绝缘: <span id="iso">-</span> kΩ</div>
        <div>故障等级: <span id="faultlvl">-</span></div>
        <div>故障信息: <span id="faultmsg">-</span></div>
      </div>
      <div class="panel" style="right:2%; top:2%; width:400px; height:300px;">
        <div style="font-weight:bold; margin-bottom:8px">实时 CAN 数据流</div>
        <div id="canFrames" style="height:260px; overflow-y:auto; font-family:monospace; font-size:12px; background:rgba(0,0,0,0.3); padding:8px; border-radius:4px;">
          等待 CAN 数据...
        </div>
      </div>
      <div class="car"></div>
      <!-- 右下角：CAN 数据解析入口 -->
      <div class="can-btn"><a href="/can_data_analysis" target="_self">🔧 CAN 数据解析</a></div>
    </div>
  </div>
<script>
(function(){
  const W = window.innerWidth, H = window.innerHeight;
  const bg = document.getElementById('bg');
  const ctx = bg.getContext('2d');
  bg.width = W; bg.height = H;
  const rings = Array.from({length: 30}).map(()=>({
    x: Math.random()*W, y: Math.random()*H, r: 30+Math.random()*80, s: Math.random()*0.8+0.2
  }));
  function draw(){
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle = 'rgba(12,36,79,0.35)';
    for(const k of rings){
      ctx.beginPath(); ctx.arc(k.x,k.y,k.r,0,Math.PI*2);
      ctx.strokeStyle = 'rgba(63,140,255,0.15)'; ctx.lineWidth = 2; ctx.stroke();
      k.r += k.s; if (k.r>120) { k.r = 30; }
    }
    requestAnimationFrame(draw);
  }
  draw();

  function $(id){ return document.getElementById(id); }
  const connDot = $('connDot'), connText = $('connText');
  const monDot  = $('monDot'),  monText  = $('monText');
  const brSpan  = $('br');
  const fpsSpan = $('fps');
  const totalSpan = $('total');
  const g1 = $('g1'), g2=$('g2'), g3=$('g3');
  const bmst=$('bmst'), bmsi=$('bmsi'), cellv=$('cellv'), tempt=$('tempt'), iso=$('iso'), faultlvl=$('faultlvl'), faultmsg=$('faultmsg');

  // ⭐ 配置后端服务器地址 ⭐
  // 选项1: 使用固定IP（修改下面的IP地址）
  const BACKEND_HOST = '172.17.237.241';  // ← 修改为您的后端服务器IP
  
  // 选项2: 自动从浏览器URL获取（注释掉上面，取消注释下面）
  // const BACKEND_HOST = location.hostname;
  
  // WebSocket连接
  let proto = location.protocol === 'https:' ? 'wss' : 'ws';
  let ws = new WebSocket(`${proto}://${BACKEND_HOST}:5052/ui`);

  ws.onmessage = (ev)=>{
    try{
      const msg = JSON.parse(ev.data);
      if (msg && msg.event){
        if (msg.event === 'server_connection'){
          const ok = !!(msg.data && msg.data.connected);
          connDot.className = 'dot ' + (ok ? 'on' : '');
          connText.textContent = ok ? `设备已连接 ${msg.data.host||''}:${msg.data.port||''}` : '设备未连接';
        } else if (msg.event === 'can_monitor'){
          const running = msg.data && msg.data.action === 'start';
          monDot.className = 'dot ' + (running ? 'on' : '');
          monText.textContent = running ? '监控已启动' : '监控未启动';
        } else if (msg.event === 'can_bitrate'){
          const d = msg.data || {}; brSpan.textContent = `CAN1 ${d.can1||'-'} / CAN2 ${d.can2||'-'}`;
        } else if (msg.event === 'metrics'){
          const d = msg.data || {}; fpsSpan.textContent = d.fps||0; totalSpan.textContent = d.total||0;
          g1.textContent = (d.kpi1||0).toFixed(2); g2.textContent = (d.kpi2||0).toFixed(2); g3.textContent = (d.kpi3||0).toFixed(2);
        } else if (msg.event === 'bms_metrics'){
          const m = msg.data || {};
          bmst.textContent = (m.total_voltage!=null? m.total_voltage:'-');
          bmsi.textContent = (m.current!=null? m.current:'-');
          cellv.textContent = `${m.cell_v_max??'-'}/${m.cell_v_min??'-'}/${m.cell_v_avg??'-'}`;
          tempt.textContent = `${m.temp_max??'-'}/${m.temp_min??'-'}/${m.temp_avg??'-'}`;
          iso.textContent = m.insulation ?? '-';
          faultlvl.textContent = m.fault_level ?? '-';
          faultmsg.textContent = m.fault_msg ?? '-';
        } else if (msg.event === 'can_frames'){
          // 处理实时CAN帧数据
          const canDiv = document.getElementById('canFrames');
          const lines = msg.data.lines || [];
          if (lines.length > 0) {
            // 添加新的CAN帧，保持最新的在顶部
            const newContent = lines.map(line => `<div style="color:#00ff88">${line}</div>`).join('');
            canDiv.innerHTML = newContent + canDiv.innerHTML;
            
            // 限制显示行数，避免页面卡顿
            const divs = canDiv.querySelectorAll('div');
            if (divs.length > 100) {
              for (let i = 100; i < divs.length; i++) {
                divs[i].remove();
              }
            }
          }
        }
      }
    }catch(e){/* ignore */}
  };
})();
</script>
</body>
</html>
