<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>文件管理</title>
<link rel="stylesheet" href="/static/shared.css">
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--acc:#0284c7;--txt:#f1f5f9;--txt2:#94a3b8;--ok:#22c55e;--err:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px}
.card{background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;padding:14px;margin-bottom:14px}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
input[type=text]{background:var(--bg3);border:1px solid #475569;color:var(--txt);padding:7px 10px;border-radius:6px;font-family:monospace;font-size:13px;flex:1;min-width:200px}
input[type=text]:focus{outline:none;border-color:var(--acc)}
.btn{padding:7px 14px;border:1px solid #475569;border-radius:6px;background:var(--bg3);color:var(--txt);cursor:pointer;font-size:13px;transition:.15s;white-space:nowrap}
.btn:hover{background:#475569}.btn:disabled{opacity:.5;cursor:default}
.btn-p{background:var(--acc);border-color:var(--acc);color:#fff}.btn-p:hover{background:#0369a1}
.btn-d{background:#7f1d1d;border-color:#991b1b;color:#fca5a5}.btn-d:hover{background:#991b1b}
.crumbs{display:flex;gap:4px;flex-wrap:wrap;margin-top:10px;font-size:13px;align-items:center}
.crumbs a{color:var(--acc);text-decoration:none;padding:2px 4px;border-radius:4px}.crumbs a:hover{background:var(--bg3)}
.crumbs .sep{color:var(--txt2)}

/* 拖拽区 */
.drop-zone{border:2px dashed var(--bg3);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:.2s;margin-bottom:14px;color:var(--txt2)}
.drop-zone.drag-over{border-color:var(--acc);background:rgba(2,132,199,0.08);color:var(--txt)}
.drop-zone input{display:none}

/* 进度 */
.prog-wrap{background:var(--bg3);border-radius:4px;height:8px;overflow:hidden;margin-top:8px;display:none}
.prog-bar{height:8px;background:var(--acc);border-radius:4px;transition:width .2s}
#upload-status{font-size:13px;color:var(--txt2);margin-top:6px}

/* 表格 */
table{width:100%;border-collapse:collapse}
thead tr{border-bottom:2px solid var(--bg3)}
th{padding:9px 8px;text-align:left;color:var(--txt2);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.04em}
td{padding:8px 8px;border-bottom:1px solid #1e293b;font-size:13px}
tr:hover td{background:rgba(255,255,255,.03)}
.mono{font-family:monospace;font-size:12px}
.dir-icon{color:#f59e0b}
.file-icon{color:var(--txt2)}
.actions{display:flex;gap:6px}
.actions .btn{padding:3px 10px;font-size:12px}

/* toast */
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;animation:fadeIn .2s;max-width:320px}
.toast-ok{background:#14532d;color:#bbf7d0;border:1px solid #166534}
.toast-err{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.empty{text-align:center;padding:40px;color:var(--txt2)}
</style>
</head>
<body>
<div class="wrap">

  <!-- 工具栏 -->
  <div class="card">
    <div class="toolbar">
      <input id="path" type="text" value="/" class="mono">
      <button class="btn btn-p" onclick="listDir()">浏览</button>
      <button class="btn" onclick="goUp()">上一级</button>
      <button class="btn" onclick="mkdirDialog()">新建文件夹</button>
      <button class="btn" onclick="listDir()">刷新</button>
    </div>
    <div id="crumbs" class="crumbs"></div>
  </div>

  <!-- 拖拽上传区 -->
  <div class="drop-zone" id="dropZone"
       onclick="document.getElementById('fileInput').click()"
       ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
    <input type="file" id="fileInput" multiple onchange="uploadFiles(this.files)">
    <div>📁 拖拽文件到此处，或 <b style="color:var(--acc)">点击选择</b> 上传到当前目录</div>
    <div class="prog-wrap" id="prog-wrap"><div class="prog-bar" id="prog-bar" style="width:0%"></div></div>
    <div id="upload-status"></div>
  </div>

  <!-- 文件列表 -->
  <div class="card" id="list-card">
    <div id="list-body">
      <div class="empty">加载中...</div>
    </div>
  </div>
</div>

<script>
let BASE_DIR = '/';

function toast(msg, ok=true) {
  const d = document.createElement('div');
  d.className = 'toast ' + (ok ? 'toast-ok' : 'toast-err');
  d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 3500);
}

function fmt(bytes) {
  let n = Number(bytes)||0;
  if(n<1024) return n+' B';
  if(n<1048576) return (n/1024).toFixed(1)+' KB';
  if(n<1073741824) return (n/1048576).toFixed(1)+' MB';
  return (n/1073741824).toFixed(2)+' GB';
}

function join(a, b) {
  if(!a) return b||''; if(!b) return a;
  return a.endsWith('/') ? a+b : a+'/'+b;
}

function setCrumbs(path) {
  const root = BASE_DIR;
  let rel = path.replace(root,'');
  if(rel.startsWith('/')) rel = rel.slice(1);
  const parts = rel ? rel.split('/').filter(Boolean) : [];
  const box = document.getElementById('crumbs');
  box.innerHTML = '';
  let cur = root;
  const a = (p, lbl) => {
    const el = document.createElement('a');
    el.href = '#'; el.textContent = lbl;
    el.onclick = e => { e.preventDefault(); enterDir(p); };
    box.appendChild(el);
  };
  a(root, root);
  for(const p of parts) {
    const sep = document.createElement('span');
    sep.className = 'sep'; sep.textContent = '/';
    box.appendChild(sep);
    cur = join(cur, p);
    a(cur, p);
  }
}

async function getBase() {
  try {
    const r = await fetch('/api/fs/base');
    const j = await r.json();
    if(j && j.ok && j.base) {
      BASE_DIR = j.base;
      document.getElementById('path').value = BASE_DIR;
    }
  } catch(e) {}
}

async function listDir(p) {
  if(!p) p = document.getElementById('path').value.trim()||'/';
  document.getElementById('path').value = p;
  setCrumbs(p);
  const cp = p.replace('/CAN_mess','/can_mess');
  document.getElementById('list-body').innerHTML = '<div class="empty">加载中...</div>';
  try {
    const r = await fetch('/api/fs/list?path='+encodeURIComponent(cp));
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j = await r.json();
    let items = [];
    if(Array.isArray(j.items)) items = j.items;
    else if(j.data && Array.isArray(j.data.items)) items = j.data.items;
    items = items.map(it => typeof it==='string' ? {name:it,is_dir:false,size:0,mtime:0} : it);
    items.sort((a,b) => (b.is_dir?1:0)-(a.is_dir?1:0) || a.name.localeCompare(b.name));
    renderTable(items, cp);
  } catch(e) {
    document.getElementById('list-body').innerHTML = '<div class="empty" style="color:var(--err)">加载失败: '+e.message+'</div>';
  }
}

function renderTable(items, curPath) {
  if(items.length===0) {
    document.getElementById('list-body').innerHTML = '<div class="empty">空目录</div>';
    return;
  }
  let h = '<table><thead><tr><th>名称</th><th>类型</th><th>大小</th><th>修改时间</th><th>操作</th></tr></thead><tbody>';
  items.forEach(it => {
    const fp = curPath.endsWith('/') ? curPath+it.name : curPath+'/'+it.name;
    const fpE = fp.replace(/'/g,'%27');
    const mtime = it.mtime ? new Date(it.mtime*1000).toLocaleString() : '--';
    const icon = it.is_dir ? '📁' : '📄';
    h += `<tr>
      <td class="mono">${icon} ${it.name}</td>
      <td>${it.is_dir ? '<span style="color:#f59e0b">目录</span>' : '文件'}</td>
      <td class="mono">${it.is_dir ? '--' : fmt(it.size||0)}</td>
      <td class="mono" style="color:var(--txt2)">${mtime}</td>
      <td><div class="actions">
        ${it.is_dir
          ? `<button class="btn btn-p" onclick="enterDir('${fpE}')">进入</button>`
          : `<button class="btn" onclick="download('${fpE}')">下载</button>`}
        <button class="btn" onclick="renamePath('${fpE}','${it.name.replace(/'/g,'%27')}')">重命名</button>
        <button class="btn btn-d" onclick="del('${fpE}')">删除</button>
      </div></td>
    </tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('list-body').innerHTML = h;
}

function enterDir(p) { listDir(p); }

function goUp() {
  const p = document.getElementById('path').value.trim();
  if(!p || p===BASE_DIR) return;
  const up = p.substring(0, p.lastIndexOf('/'))||'/';
  listDir(up);
}

async function mkdirDialog() {
  const base = document.getElementById('path').value.trim()||'/';
  const name = prompt('新建文件夹名称:');
  if(!name) return;
  try {
    const r = await fetch('/api/fs/mkdir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({base,name})});
    const j = await r.json();
    if(j.ok!==false) { toast('文件夹已创建'); listDir(); }
    else toast('失败: '+(j.error||'未知错误'), false);
  } catch(e) { toast('请求失败: '+e.message, false); }
}

async function renamePath(path, curName) {
  const n = prompt('重命名为:', decodeURIComponent(curName)||'');
  if(!n || n===decodeURIComponent(curName)) return;
  try {
    const r = await fetch('/api/fs/rename',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:decodeURIComponent(path),new_name:n})});
    const j = await r.json();
    if(j.ok!==false) { toast('重命名成功'); listDir(); }
    else toast('失败: '+(j.error||'未知错误'), false);
  } catch(e) { toast('请求失败: '+e.message, false); }
}

async function del(path) {
  if(!confirm('确认删除:\n'+decodeURIComponent(path))) return;
  try {
    const r = await fetch('/api/fs/delete',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({path:decodeURIComponent(path)})});
    const j = await r.json();
    if(j.ok!==false) { toast('已删除'); listDir(); }
    else toast('删除失败: '+(j.error||'未知错误'), false);
  } catch(e) { toast('请求失败: '+e.message, false); }
}

function download(path) {
  window.open('/api/fs/download?path='+encodeURIComponent(decodeURIComponent(path)), '_blank');
}

/* 上传（支持多文件） */
async function uploadFiles(files) {
  if(!files || files.length===0) return;
  const base = document.getElementById('path').value.trim()||'/';
  const wrap = document.getElementById('prog-wrap');
  const bar = document.getElementById('prog-bar');
  const status = document.getElementById('upload-status');
  wrap.style.display='block';

  for(let i=0; i<files.length; i++) {
    const f = files[i];
    status.textContent = `上传 ${i+1}/${files.length}: ${f.name} ...`;
    bar.style.width = Math.round((i/files.length)*100)+'%';
    await new Promise((res, rej) => {
      const fd = new FormData();
      fd.append('file', f); fd.append('base', base); fd.append('path', base);
      const xhr = new XMLHttpRequest();
      xhr.open('POST','/api/fs/upload');
      xhr.upload.onprogress = e => {
        if(e.lengthComputable) {
          const overall = ((i + e.loaded/e.total)/files.length)*100;
          bar.style.width = overall.toFixed(1)+'%';
        }
      };
      xhr.onload = () => {
        try { const j = JSON.parse(xhr.responseText); if(j.ok===false) rej(j.error||'上传失败'); else res(); }
        catch(e) { xhr.status<400 ? res() : rej('HTTP '+xhr.status); }
      };
      xhr.onerror = () => rej('网络错误');
      xhr.send(fd);
    }).then(
      () => {},
      err => { toast(f.name+' 上传失败: '+err, false); }
    );
  }
  bar.style.width='100%';
  status.textContent = `上传完成 (${files.length} 个文件)`;
  setTimeout(()=>{ wrap.style.display='none'; status.textContent=''; bar.style.width='0%'; },2000);
  toast(`已上传 ${files.length} 个文件`);
  listDir();
  document.getElementById('fileInput').value='';
}

/* 拖拽 */
function onDragOver(e) { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); }
function onDragLeave(e) { document.getElementById('dropZone').classList.remove('drag-over'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  uploadFiles(e.dataTransfer.files);
}

document.addEventListener('DOMContentLoaded', async () => { await getBase(); listDir(); });
</script>
<script src="/static/shared.js"></script>
</body>
</html>
